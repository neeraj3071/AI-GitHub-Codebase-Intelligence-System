name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Compile backend
        run: mvn -B -DskipTests compile

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config > /tmp/compose.txt

      - name: Build backend service image
        run: docker build -f backend/Dockerfile.service --build-arg MODULE=api-gateway-service -t aicbi/api-gateway:ci backend

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t aicbi/frontend:ci frontend
